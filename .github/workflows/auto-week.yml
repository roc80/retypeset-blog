name: Auto Weekly Journal

# 仅定时 + 手动触发，不监听 push（避免和 deploy.yml 互相触发）
on:
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:

permissions:
  contents: write   # 允许 GITHUB_TOKEN 把生成的源文件推回 master
  actions: write    # 允许 GITHUB_TOKEN 触发 deploy.yml（workflow_dispatch）

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm globally
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: 生成周记（拉消息 / 按本周过滤 / 下图 / 调 GLM / 写文件）
        env:
          TZ: Asia/Shanghai            # 让脚本里 dayjs 取北京时间
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}   # 可选，留空则默认 glm-4.6
        run: pnpm tsx scripts/generate-week.ts

      - name: 推送生成的源文件到 master
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "本周无新内容，跳过提交与部署。"
          else
            git commit -m "chore(week): auto weekly journal $(TZ=Asia/Shanghai date +%Y-%m-%d)"
            # 先拉取远端最新并 rebase，避免 checkout 后 master 被推进导致 push 被拒(non-fast-forward)
            git pull --rebase origin master
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # inbox 不再清空：消息靠 Worker KV 写入时的 14 天 TTL 自动过期。
      # 脚本按"当前 ISO 周"过滤，本周内任意时刻生成都能拿到本周完整消息（幂等）；
      # 跨周消息自动被过滤排除，不会混入新一周的周记。

      # 用默认 GITHUB_TOKEN 推送的 commit 不会触发 on: push 工作流（GitHub 防循环），
      # 所以这里显式 dispatch deploy.yml 来完成构建 + rsync 部署。
      # workflow_dispatch 是允许被 GITHUB_TOKEN 触发的例外事件（需 actions: write 权限）。
      - name: 触发 deploy.yml 部署
        if: steps.commit.outputs.committed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'master',
            })
            core.info('已触发 deploy.yml（Deploy Blog to Server），构建与部署由其接管')
